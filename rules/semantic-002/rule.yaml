# Rule Configuration: semantic-002
# description-workflow

id: semantic-002
name: description-workflow
description: Ensures description does not summarize workflow steps

validation:
  dimension: semantic
  level: WARNING
  phase: Phase 3

requires:
  - struct-001
  - struct-003

detection:
  type: pattern_match
  patterns:
    - 'step \d+'
    - '\bfirst\b'
    - '\bthen\b'
    - '\bnext\b'
    - '\bfinally\b'
    - '\bprocess\b'
    - '\bworkflow\b'

error_messages:
  contains_workflow: 'Description should not summarize workflow steps; put workflow in SKILL.md body'

severity:
  blockers: 0
  warnings: 1
  hints: 0

owner: skill-harness-team
version: "1.0.0"
created: "2026-04-11"
