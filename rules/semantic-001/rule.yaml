# Rule Configuration: semantic-001
# description-start

id: semantic-001
name: description-start
description: Ensures description starts with "Use when..." for optimal triggering

validation:
  dimension: semantic
  level: HINT
  phase: Phase 3

requires:
  - struct-001
  - struct-003

detection:
  type: starts_with
  valid_starts:
    - 'use when'
    - 'use this when'
    - 'use this skill'
    - 'use the'
    - 'use a'
    - 'use these'
    - 'use it'
    - 'use it to'
    - 'when the user'
    - 'whenever the user'
    - 'when you need'
    - 'for'

error_messages:
  invalid_start: 'Description should start with "Use when..." for optimal triggering'

severity:
  blockers: 0
  warnings: 0
  hints: 1

owner: skill-harness-team
version: "1.0.0"
created: "2026-04-11"
